<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tambak Bayan GO-WEB - Pilih kategori mural: Kritik Sosial, Budaya Lokal, atau Kehidupan Sehari-Hari."
    />
    <title>Tambak Bayan GO-WEB - Kategori Mural</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geologica', 'system-ui', 'sans-serif'],
              logo: ['Impact', 'sans-serif'],
            },
            colors: {
              'gradient-yellow': '#EEBB3B',
              'gradient-red':    '#B92E2B',
              'tb-blue':         '#1E459F',
              'tb-red':          '#CF2A2A',
              'tb-beige':        '#E1DCCA',
              'tb-brown':        '#78350f',
              'sunset-gold':     '#EEBB3B',
              'sunset-red':      '#B92E2B',
              'footer-blue':     '#143D73',
              'footer-gold':     '#DEA921',
            },
          },
        },
      };
    </script>

    <!-- Google Fonts: Geologica -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      /* ── Kartu kategori: overlay gelap gradient dari bawah ── */
      .kategori-card {
        position: relative;
        width: 100%;
        border-radius: 1rem;          /* rounded-2xl */
        overflow: hidden;
        cursor: pointer;
        /* tinggi tetap, sesuai mockup ~200px di desktop */
        height: 200px;
        display: block;
        text-decoration: none;
        /* border tipis gelap seperti di mockup */
        border: 2px solid rgba(120, 53, 15, 0.25);
        box-shadow: 0 6px 28px rgba(0, 0, 0, 0.28);
        transition: transform 0.28s ease, box-shadow 0.28s ease;
      }

      @media (min-width: 640px)  { .kategori-card { height: 220px; } }
      @media (min-width: 1024px) { .kategori-card { height: 240px; } }

      .kategori-card:hover {
        transform: translateY(-4px) scale(1.005);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.42);
      }

      /* Foto background */
      .kategori-card img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 0.4s ease;
      }
      .kategori-card:hover img {
        transform: scale(1.04);
      }

      /* Overlay gelap semi-transparan di seluruh kartu (efek foto agak gelap) */
      .kategori-card .card-overlay {
        position: absolute;
        inset: 0;
        /* gradien dari bawah ke tengah agar teks terbaca */
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.62) 0%,
          rgba(0, 0, 0, 0.22) 50%,
          rgba(0, 0, 0, 0.08) 100%
        );
        z-index: 1;
      }

      /* Label teks di tengah kartu */
      .kategori-card .card-label {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .kategori-card .card-label span {
        font-family: 'Geologica', system-ui, sans-serif;
        font-weight: 700;
        color: #ffffff;
        font-size: clamp(1.35rem, 3.5vw, 2rem);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
        letter-spacing: 0.01em;
        text-align: center;
        padding: 0 1rem;
      }
    </style>
  </head>

  <body class="font-sans antialiased text-gray-900 min-h-screen">
    <main
      class="w-full min-h-screen overflow-x-hidden"
      style="background: linear-gradient(180deg, #EEBB3B 0%, #e0a020 30%, #c96418 65%, #B92E2B 100%);"
    >

      <!-- ══════════════════════════════════════════
           HEADER  — identik dengan index.html
           "Koleksi Mural" = state aktif (underline)
           ══════════════════════════════════════════ -->
        <div id="navbar-container"></div>
          <script src="/navbar.js"></script>

      <!-- ══════════════════════════════════════════
           KONTEN UTAMA — 3 Kartu Kategori
           ══════════════════════════════════════════ -->
      <section
        class="w-full px-5 sm:px-8 md:px-12 lg:px-20 py-10 sm:py-12 md:py-14"
        aria-label="Kategori Mural"
      >
        <!-- Stack vertikal, gap sesuai mockup -->
        <div class="max-w-4xl mx-auto flex flex-col gap-6 sm:gap-7 md:gap-8">

          <!-- ── Kartu 1: Kritik Sosial ── -->
          <!--
            Ganti src di bawah dengan path aset Anda:
            contoh: src="assets/mural/kritik-sosial-cover.jpg"
          -->
          <a
            href="mural-kritik-sosial.html"
            class="kategori-card"
            aria-label="Lihat koleksi mural Kritik Sosial"
          >
            <img
              src="/assets/koleksi-mural/Kritik Sosial.jpg"
              alt="Mural Kritik Sosial"
              loading="eager"
            />
            <div class="card-overlay"></div>
            <div class="card-label">
              <span>Kritik Sosial</span>
            </div>
          </a>

          <!-- ── Kartu 2: Budaya Lokal ── -->
          <!--
            Ganti src di bawah dengan path aset Anda:
            contoh: src="assets/mural/budaya-lokal-cover.jpg"
          -->
          <a
            href="mural-budaya-lokal.html"
            class="kategori-card"
            aria-label="Lihat koleksi mural Budaya Lokal"
          >
            <img
              src="/assets/koleksi-mural/Budaya Lokal.jpg"
              alt="Mural Budaya Lokal"
              loading="lazy"
            />
            <div class="card-overlay"></div>
            <div class="card-label">
              <span>Budaya Lokal</span>
            </div>
          </a>

          <!-- ── Kartu 3: Kehidupan Sehari-Hari ── -->
          <!--
            Ganti src di bawah dengan path aset Anda:
            contoh: src="assets/mural/kehidupan-sehari-hari-cover.jpg"
          -->
          <a
            href="mural-kehidupan-sehari-hari.html"
            class="kategori-card"
            aria-label="Lihat koleksi mural Kehidupan Sehari-Hari"
          >
            <img
              src="/assets/koleksi-mural/Kehidupan Sehari-hari.jpg"
              alt="Mural Kehidupan Sehari-Hari"
              loading="lazy"
            />
            <div class="card-overlay"></div>
            <div class="card-label">
              <span>Kehidupan Sehari - Hari</span>
            </div>
          </a>

        </div>
      </section>

      <!-- ══════════════════════════════════════════
           FOOTER  — identik dengan index.html
           ══════════════════════════════════════════ -->
      <footer class="w-full bg-[#143D73] text-[#DEA921] py-10 md:py-14 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-start md:justify-between gap-8 md:gap-12">

          <div class="flex flex-col gap-4 md:gap-5">
            <div class="font-logo leading-tight">
              <img
                src="/assets/beranda/logo_footer.png"
                alt="Tambak Bayan GO-WEB"
                class="h-10 sm:h-12 md:h-14 object-contain"
              />
              <span class="sr-only">Tambak Bayan GO-WEB</span>
            </div>
            <div class="flex items-center gap-4">
              <a
                href="https://www.instagram.com/institutsenitambakbayan/"
                target="_blank"
                rel="noopener noreferrer"
                class="w-9 h-9 flex items-center justify-center rounded-full bg-[#DEA921]/10 hover:bg-[#DEA921]/20 transition-colors"
                aria-label="Instagram"
              ><i class="fab fa-instagram text-lg"></i></a>
              <a
                href="mailto:contact@tambakbayan.com"
                class="w-9 h-9 flex items-center justify-center rounded-full bg-[#DEA921]/10 hover:bg-[#DEA921]/20 transition-colors"
                aria-label="Email"
              ><i class="fas fa-envelope text-lg"></i></a>
              <a
                href="https://maps.app.goo.gl/mW5gzKq7QU7jjZYP8"
                target="_blank"
                rel="noopener noreferrer"
                class="w-9 h-9 flex items-center justify-center rounded-full bg-[#DEA921]/10 hover:bg-[#DEA921]/20 transition-colors"
                aria-label="Lokasi"
              ><i class="fas fa-location-dot text-lg"></i></a>
            </div>
          </div>

          <blockquote class="md:max-w-[55%] lg:max-w-[50%] font-sans">
            <p class="text-[#DEA921]/95 text-sm sm:text-base leading-relaxed">
              "Semua proses akan menemukan keindahannya pada waktu yang tepat.
              Selama mural tetap hidup di dinding dan warga terus membuka meja
              bagi para tamu, Tambak Bayan akan terus bersuara"
              <cite class="block mt-2 font-semibold not-italic text-[#CF2A2A]">— Suseno Karja</cite>
            </p>
          </blockquote>

        </div>
      </footer>

    </main>

    <!-- Mobile menu toggle script -->
    <script>
      (function () {
        var toggle = document.getElementById('menu-toggle');
        var nav    = document.getElementById('main-nav');
        if (!toggle || !nav) return;
        toggle.addEventListener('click', function () {
          var expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          nav.classList.toggle('hidden');
        });
        document.querySelectorAll('#main-nav a').forEach(function (link) {
          link.addEventListener('click', function () {
            toggle.setAttribute('aria-expanded', 'false');
            nav.classList.add('hidden');
          });
        });
      })();
    </script>
  </body>
</html>
